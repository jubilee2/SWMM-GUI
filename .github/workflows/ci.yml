name: CI

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run test:server
      - run: npm --prefix client ci
      - run: npm --prefix client run lint
      - run: npm --prefix client test
      - run: npm run build

