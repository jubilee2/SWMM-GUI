<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWMM Web Runner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { padding: 2rem; }
        #map { height: 400px; background-color: #f0f0f0; border: 1px solid #ccc; margin-top: 1rem; }
        #results { margin-top: 1rem; }
        .log {
            background-color: #333;
            color: #fff;
            padding: 15px;
            border-radius: 5px;
            margin-top: 1rem;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SWMM Web Runner</h1>
        <hr>

        <div class="mb-3">
            <h3>1. Upload SWMM Input File (.inp)</h3>
            <form id="uploadForm">
                <div class="input-group">
                    <input type="file" class="form-control" id="swmmFileInput" accept=".inp" required>
                    <button class="btn btn-primary" type="submit">Upload</button>
                </div>
            </form>
        </div>

        <div class="mb-3">
            <h3>2. Run Simulation</h3>
            <button class="btn btn-success" id="runButton" disabled>Run Simulation</button>
        </div>

        <div id="status" class="log">
            <p>Status messages will appear here...</p>
        </div>

        <h3>Results</h3>
        <div id="results">
            <p>Results will be displayed here.</p>
        </div>

        <h3>Map</h3>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
